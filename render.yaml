services:
  - type: web
    name: b2b-backend
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install --only-binary=:all: -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PIP_NO_BUILD_ISOLATION
        value: false
      - key: PIP_PREFER_BINARY
        value: 1
      - key: PIP_ONLY_BINARY
        value: :all:
      - key: DATABASE_URL
        fromDatabase:
          name: b2b-database
          property: connectionString
    healthCheckPath: /

databases:
  - name: b2b-database
    plan: free
    databaseName: b2b_marketplace
    user: b2b_user
